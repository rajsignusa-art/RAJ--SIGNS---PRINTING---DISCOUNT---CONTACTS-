<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Raj Signs & Printing LLC</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(145deg, #071b38, #123f72);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      color: #172033;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .header {
      background: linear-gradient(135deg, #e51d2a, #a9000b);
      color: white;
      padding: 34px 22px;
    }

    .header h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.15;
    }

    .header p {
      margin: 12px 0 0;
      font-size: 18px;
    }

    .discount {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 20px;
      background: #ffd338;
      color: #111;
      border-radius: 30px;
      font-size: 22px;
      font-weight: bold;
    }

    .content {
      padding: 28px 24px 34px;
    }

    .content h2 {
      margin: 0 0 8px;
      color: #0e3970;
    }

    .content p {
      margin: 0 0 24px;
      color: #555;
      line-height: 1.5;
    }

    .button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 17px 18px;
      border-radius: 12px;
      color: white;
      text-decoration: none;
      font-size: 19px;
      font-weight: bold;
      transition: transform 0.15s ease;
    }

    .button:hover {
      transform: scale(1.02);
    }

    .whatsapp {
      background: #25d366;
    }

    .sms {
      background: #1769e0;
    }

    .call {
      background: #e51d2a;
    }

    .email {
      background: #555f70;
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="header">
      <h1>RAJ SIGNS & PRINTING LLC</h1>
      <p>Professional Signs for Your Business</p>
      <div class="discount">GET UP TO 50% DISCOUNT</div>
    </div>

    <div class="content">
      <a href="#contact-buttons">
  <img
    src="ChatGPT Image Jul 14, 2026, 05_56_21 PM.png"
    alt="Raj Signs Discount Advertisement"
    style="width:100%; height:auto; display:block; border-radius:14px; margin-bottom:20px; cursor:pointer;"
  >
</a>
      
     <h2 id="contact-buttons">Interested in Our Special Offer?</h2>
      <p>Select an option below to contact us and receive a free quote.</p>

      <a
        class="button whatsapp"
        href="https://wa.me/18328495404?text=Hello%20Raj%20Signs%2C%20I%20am%20interested%20in%20your%20sign%20discount.%20Please%20send%20me%20a%20free%20quote."
      >
        WhatsApp Message
      </a>

      <a
        class="button sms"
        href="sms:+18328495404?body=Hello%20Raj%20Signs%2C%20I%20am%20interested%20in%20your%20sign%20discount.%20Please%20send%20me%20a%20free%20quote."
      >
        Send SMS
      </a>

      <a class="button call" href="tel:+18328495404">
        Call 832-849-5404
      </a>

      <a
        class="button email"
        href="mailto:rajsignusa@gmail.com?subject=Sign%20Discount%20Inquiry&body=Hello%20Raj%20Signs%2C%20I%20am%20interested%20in%20your%20sign%20discount.%20Please%20send%20me%20a%20free%20quote."
      >
        Send Email
      </a>

      <div class="footer">
        Free quote • Signs • Printing • Business Advertising
      </div>
    </div>

  </div>

</body>
</html>
